services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=father_jose
      - POSTGRES_PASSWORD=father_jose
      - POSTGRES_DB=father-database
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://father_jose:father_jose@postgres:5432/father-database
    depends_on:
      - postgres
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./public
          target: /app/public
        - action: rebuild
          path: ./package.json

  docs:
    build:
      context: ./apps/docs
      target: dev
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./apps/docs
          target: /app
          ignore:
            - .vitepress/dist
        - action: rebuild
          path: ./apps/docs/package.json

volumes:
  pgdata:
