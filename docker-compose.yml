services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=father_jose
      - POSTGRES_PASSWORD=father_jose
      - POSTGRES_DB=father-database
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      target: dev
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://father_jose:father_jose@postgres:5432/father-database
    depends_on:
      - postgres
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/src
        - action: rebuild
          path: ./apps/api/package.json

  site:
    build:
      context: ./apps/site
      target: dev
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:3001
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./apps/site/src
          target: /app/src
        - action: sync
          path: ./apps/site/public
          target: /app/public
        - action: rebuild
          path: ./apps/site/package.json

  docs:
    build:
      context: ./apps/docs
      target: dev
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./apps/docs
          target: /app
          ignore:
            - .vitepress/dist
        - action: rebuild
          path: ./apps/docs/package.json

  admin:
    build:
      context: ./apps/admin
      target: dev
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./apps/admin/src
          target: /app/src
        - action: rebuild
          path: ./apps/admin/package.json

volumes:
  pgdata:
